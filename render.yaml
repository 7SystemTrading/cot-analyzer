services:
  - type: web
    name: cot-analyzer
    runtime: python
    rootDir: .
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npm run build &&
      cp -r dist ../backend/static
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./cot_data.db
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.11.0"
    healthCheckPath: /api/v1/dashboard
